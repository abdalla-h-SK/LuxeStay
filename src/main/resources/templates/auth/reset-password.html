<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — LuxeStay</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <a href="/" class="auth-brand"><i class="fas fa-hotel"></i> LuxeStay</a>
      <h1>Reset Password</h1>
      <p>Enter the code sent to your email and set a new password</p>
    </div>
    <form id="resetForm" class="auth-form">
      <input type="hidden" id="emailField" th:value="${email}"/>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="emailVisible" class="form-input" th:value="${email}" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-hashtag"></i> OTP Code</label>
        <input type="text" id="otpCode" class="form-input" placeholder="6-digit code" maxlength="6" required/>
        <span class="field-error" id="otpCodeError"></span>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> New Password</label>
        <div class="input-icon-right">
          <input type="password" id="newPassword" class="form-input" placeholder="New password" required/>
          <i class="fas fa-eye toggle-pw" onclick="togglePassword('newPassword')"></i>
        </div>
        <span class="field-error" id="newPasswordError"></span>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
        <div class="input-icon-right">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required/>
          <i class="fas fa-eye toggle-pw" onclick="togglePassword('confirmPassword')"></i>
        </div>
        <span class="field-error" id="confirmPasswordError"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="resetBtn">
        <span class="btn-text">Reset Password</span>
        <span class="btn-spinner" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
      </button>
    </form>
    <p class="auth-switch"><a href="/auth/login" class="link-primary"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script th:src="@{/js/app.js}"></script>
<script>
  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    const np = document.getElementById('newPassword').value;
    const cp = document.getElementById('confirmPassword').value;
    if (np !== cp) { showFieldError('confirmPasswordError', 'Passwords do not match'); return; }
    const btn = document.getElementById('resetBtn');
    setButtonLoading(btn, true);
    try {
      await apiPost('/api/auth/reset-password', {
        email: document.getElementById('emailVisible').value,
        otpCode: document.getElementById('otpCode').value,
        newPassword: np,
        confirmPassword: cp
      });
      showToast('Password reset successfully!', 'success');
      setTimeout(() => { window.location.href = '/auth/login'; }, 1200);
    } catch (err) {
      if (err.data) renderFieldErrors(err.data);
      else showToast(err.message || 'Reset failed', 'error');
    } finally { setButtonLoading(btn, false); }
  });
</script>
</body>
</html>
