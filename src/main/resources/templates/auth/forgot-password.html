<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — LuxeStay</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <a href="/" class="auth-brand"><i class="fas fa-hotel"></i> LuxeStay</a>
      <div class="otp-icon-wrap"><i class="fas fa-key"></i></div>
      <h1>Forgot password?</h1>
      <p>Enter your email and we'll send you a reset code</p>
    </div>
    <form id="forgotForm" class="auth-form">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required/>
        <span class="field-error" id="emailError"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="sendBtn">
        <span class="btn-text">Send Reset Code</span>
        <span class="btn-spinner" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
      </button>
    </form>
    <p class="auth-switch"><a href="/auth/login" class="link-primary"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script th:src="@{/js/app.js}"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('sendBtn');
    setButtonLoading(btn, true);
    try {
      await apiPost('/api/auth/forgot-password', { email: document.getElementById('email').value });
      showToast('Reset code sent! Check your email.', 'success');
      setTimeout(() => {
        window.location.href = '/auth/reset-password?email=' + encodeURIComponent(document.getElementById('email').value);
      }, 1200);
    } catch (err) {
      showToast(err.message || 'Failed to send reset code', 'error');
    } finally { setButtonLoading(btn, false); }
  });
</script>
</body>
</html>
