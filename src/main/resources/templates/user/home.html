<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LuxeStay — Find Your Perfect Room</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1>Experience Luxury Like Never Before</h1>
    <p>Find and book your perfect room with instant confirmation</p>
  </div>

  <!-- Search Bar -->
  <div class="search-box">
    <div class="search-grid">
      <div class="search-field">
        <label><i class="fas fa-calendar-check"></i> Check-in</label>
        <input type="date" id="searchCheckIn" class="form-input"/>
      </div>
      <div class="search-field">
        <label><i class="fas fa-calendar-times"></i> Check-out</label>
        <input type="date" id="searchCheckOut" class="form-input"/>
      </div>
      <div class="search-field">
        <label><i class="fas fa-bed"></i> Room Type</label>
        <select id="searchType" class="form-input">
          <option value="">All Types</option>
          <option value="SINGLE">Single</option>
          <option value="DOUBLE">Double</option>
          <option value="TWIN">Twin</option>
          <option value="SUITE">Suite</option>
          <option value="DELUXE">Deluxe</option>
          <option value="PRESIDENTIAL">Presidential</option>
        </select>
      </div>
      <div class="search-field">
        <label><i class="fas fa-dollar-sign"></i> Max Price / Night</label>
        <input type="number" id="searchMaxPrice" class="form-input" placeholder="Any price"/>
      </div>
      <button class="btn btn-primary search-btn" onclick="searchRooms()">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
  </div>
</section>

<!-- Results -->
<main class="main-content">
  <div class="section-header">
    <h2 id="resultsTitle">All Rooms</h2>
    <div class="sort-controls">
      <select id="sortBy" class="form-input" onchange="searchRooms()" style="width:auto">
        <option value="price">Price ↑</option>
        <option value="roomNumber">Room Number</option>
      </select>
    </div>
  </div>

  <div id="roomsGrid" class="rooms-grid">
    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading rooms...</div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<div th:replace="~{fragments :: toast}"></div>

<script th:src="@{/js/app.js}"></script>
<script>
  let currentPage = 0;
  let searching = false;

  // Set default dates
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const dayAfter = new Date(today); dayAfter.setDate(today.getDate() + 2);
  document.getElementById('searchCheckIn').value = formatDate(tomorrow);
  document.getElementById('searchCheckOut').value = formatDate(dayAfter);

  function formatDate(d) {
    return d.toISOString().split('T')[0];
  }

  async function searchRooms(page = 0) {
    currentPage = page;
    const checkIn = document.getElementById('searchCheckIn').value;
    const checkOut = document.getElementById('searchCheckOut').value;
    const type = document.getElementById('searchType').value;
    const maxPrice = document.getElementById('searchMaxPrice').value;
    const sortBy = document.getElementById('sortBy').value;

    let url, title;
    if (checkIn && checkOut) {
      url = `/api/rooms/available?checkIn=${checkIn}&checkOut=${checkOut}&page=${page}&size=9&sortBy=${sortBy}`;
      if (type) url += `&type=${type}`;
      if (maxPrice) url += `&maxPrice=${maxPrice}`;
      title = 'Available Rooms';
      searching = true;
    } else {
      url = `/api/rooms?page=${page}&size=9&sortBy=${sortBy}`;
      title = 'All Rooms';
      searching = false;
    }

    document.getElementById('resultsTitle').textContent = title;
    document.getElementById('roomsGrid').innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

    try {
      const data = await apiFetch(url);
      renderRooms(data.data);
    } catch (err) {
      document.getElementById('roomsGrid').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${err.message}</p></div>`;
    }
  }

  function renderRooms(pageData) {
    const grid = document.getElementById('roomsGrid');
    if (!pageData?.content?.length) {
      grid.innerHTML = '<div class="empty-state"><i class="fas fa-bed"></i><p>No rooms found for the selected criteria.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = pageData.content.map(room => `
      <div class="room-card" onclick="window.location.href='/rooms/${room.id}'">
        <div class="room-img-wrap">
          <img src="${room.imageUrl || '/images/room-default.jpg'}" alt="Room ${room.roomNumber}" class="room-img"/>
          <span class="room-badge badge-${room.status.toLowerCase()}">${room.status}</span>
          <span class="room-type-tag">${room.type}</span>
        </div>
        <div class="room-info">
          <div class="room-number">Room ${room.roomNumber}</div>
          <div class="room-desc">${room.description || 'A comfortable and elegant room for your stay.'}</div>
          <div class="room-meta">
            <span><i class="fas fa-users"></i> Up to ${room.maxOccupancy} guests</span>
          </div>
          <div class="room-footer">
            <div class="room-price">$${room.price}<span>/night</span></div>
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); bookRoom(${room.id})">Book Now</button>
          </div>
        </div>
      </div>
    `).join('');

    renderPagination(pageData, 'pagination', searchRooms);
  }

  function bookRoom(roomId) {
    const token = getAccessToken();
    if (!token) { window.location.href = '/auth/login'; return; }
    const checkIn = document.getElementById('searchCheckIn').value;
    const checkOut = document.getElementById('searchCheckOut').value;
    window.location.href = `/bookings/new?roomId=${roomId}&checkIn=${checkIn}&checkOut=${checkOut}`;
  }

  // Load on page ready
  searchRooms();
  initNavbar();
  initWebSocket();
</script>
</body>
</html>
