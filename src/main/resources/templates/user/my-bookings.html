<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings — LuxeStay</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<main class="main-content">
  <div class="page-header">
    <h1><i class="fas fa-calendar-alt"></i> My Bookings</h1>
  </div>
  <div id="bookingsList"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
  <div class="pagination" id="pagination"></div>
</main>
<div th:replace="~{fragments :: footer}"></div>
<div th:replace="~{fragments :: toast}"></div>
<div th:replace="~{fragments :: modal}"></div>
<script th:src="@{/js/app.js}"></script>
<script>
  requireAuth();

  async function loadBookings(page = 0) {
    try {
      const data = await apiFetch(`/api/bookings/my?page=${page}&size=8`);
      renderBookings(data.data);
    } catch (err) { showToast(err.message, 'error'); }
  }

  function renderBookings(pageData) {
    if (!pageData?.content?.length) {
      document.getElementById('bookingsList').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-calendar-times"></i>
          <h3>No bookings yet</h3>
          <p>Book a room to get started!</p>
          <a href="/" class="btn btn-primary">Browse Rooms</a>
        </div>`;
      return;
    }
    document.getElementById('bookingsList').innerHTML = `
      <div class="bookings-list">
        ${pageData.content.map(b => `
          <div class="booking-card status-${b.status.toLowerCase()}">
            <div class="booking-card-img">
              <img src="${b.room?.imageUrl || '/images/room-default.jpg'}" alt="Room"/>
            </div>
            <div class="booking-card-info">
              <div class="booking-card-header">
                <span class="booking-id">#${b.id}</span>
                <span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span>
              </div>
              <h3>Room ${b.room?.roomNumber} — ${b.room?.type}</h3>
              <div class="booking-dates">
                <span><i class="fas fa-sign-in-alt"></i> ${b.checkInDate}</span>
                <i class="fas fa-arrow-right"></i>
                <span><i class="fas fa-sign-out-alt"></i> ${b.checkOutDate}</span>
              </div>
              <div class="booking-meta">
                <span><i class="fas fa-moon"></i> ${b.nights} night${b.nights > 1 ? 's' : ''}</span>
                <span><i class="fas fa-users"></i> ${b.guestsCount} guest${b.guestsCount > 1 ? 's' : ''}</span>
              </div>
              <div class="booking-footer">
                <div class="booking-price">$${b.totalPrice}</div>
                <div class="booking-actions">
                  ${b.payment?.status === 'PENDING' ? `<button class="btn btn-primary btn-sm" onclick="payNow('${b.payment.approvalUrl}')"><i class="fas fa-credit-card"></i> Pay Now</button>` : ''}
                  ${['PENDING','CONFIRMED'].includes(b.status) ? `<button class="btn btn-outline btn-sm" onclick="cancelBooking(${b.id})"><i class="fas fa-times"></i> Cancel</button>` : ''}
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
    renderPagination(pageData, 'pagination', loadBookings);
  }

  function payNow(url) { if (url) window.location.href = url; }

  function cancelBooking(id) {
    showConfirmModal('Cancel Booking', 'Are you sure you want to cancel this booking?', async () => {
      try {
        await apiDelete(`/api/bookings/${id}`);
        showToast('Booking cancelled', 'success');
        loadBookings();
      } catch (err) { showToast(err.message, 'error'); }
    });
  }

  loadBookings();
  initNavbar();
  initWebSocket();
</script>
</body>
</html>
