<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} ?: 'Hotel Management'">Hotel Management</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- ── NAVBAR FRAGMENT ─────────────────────────────────────── -->
<nav th:fragment="navbar" class="navbar">
  <div class="nav-container">
    <a href="/" class="nav-brand">
      <i class="fas fa-hotel"></i>
      <span>LuxeStay</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="nav-link">Rooms</a></li>
      <li><a href="/bookings/my" class="nav-link nav-auth-only" style="display:none">My Bookings</a></li>
      <li><a href="/admin" class="nav-link nav-admin-only" style="display:none">Admin</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-guest" id="navGuest">
        <a href="/auth/login" class="btn btn-outline">Login</a>
        <a href="/auth/register" class="btn btn-primary">Register</a>
      </div>
      <div class="nav-user" id="navUser" style="display:none">
        <!-- Bell only for guests -->
        <div class="notification-bell" id="notifBell" style="display:none">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-empty">No notifications</div>
          </div>
        </div>

        <div class="user-menu">
          <span id="navUsername" class="user-avatar"></span>
          <div class="user-dropdown">
            <a href="/bookings/my"><i class="fas fa-calendar"></i> My Bookings</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ── FOOTER FRAGMENT ──────────────────────────────────────── -->
<footer th:fragment="footer" class="footer">
  <div class="footer-content">
    <div class="footer-brand">
      <i class="fas fa-hotel"></i> LuxeStay Hotel Management
    </div>
    <p>&copy; 2024 LuxeStay. All rights reserved.</p>
  </div>
</footer>

<!-- ── TOAST FRAGMENT ───────────────────────────────────────── -->
<div th:fragment="toast" id="toastContainer" class="toast-container"></div>

<!-- ── MODAL FRAGMENT ───────────────────────────────────────── -->
<div th:fragment="modal" id="confirmModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 id="modalTitle">Confirm Action</h3>
    <p id="modalMessage">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

</body>
</html>
