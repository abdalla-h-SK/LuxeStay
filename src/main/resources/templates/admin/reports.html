<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports — LuxeStay Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand"><i class="fas fa-hotel"></i> Admin Panel</div>
    <nav class="sidebar-nav">
      <a href="/admin" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/admin/rooms" class="sidebar-link"><i class="fas fa-bed"></i> Rooms</a>
      <a href="/admin/bookings" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Bookings</a>
      <a href="/admin/users" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="/admin/reports" class="sidebar-link active"><i class="fas fa-chart-bar"></i> Reports</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1>Reports &amp; Analytics</h1></div>
    <div id="reportContent"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div></div>
  </main>
</div>
<div th:replace="~{fragments :: toast}"></div>
<script th:src="@{/js/app.js}"></script>
<script>
  requireAdmin();

  async function loadReports() {
    try {
      const data = await apiFetch('/api/admin/reports');
      const r = data.data;

      document.getElementById('reportContent').innerHTML = `
        <div class="stats-grid">
          <div class="stat-card stat-revenue"><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div><div><div class="stat-value">$${(r.totalRevenue||0).toFixed(2)}</div><div class="stat-label">Total Revenue</div></div></div>
          <div class="stat-card stat-monthly"><div class="stat-icon"><i class="fas fa-calendar"></i></div><div><div class="stat-value">$${(r.monthlyRevenue||0).toFixed(2)}</div><div class="stat-label">Monthly Revenue</div></div></div>
          <div class="stat-card stat-occupancy"><div class="stat-icon"><i class="fas fa-percent"></i></div><div><div class="stat-value">${(r.occupancyRate||0).toFixed(1)}%</div><div class="stat-label">Occupancy Rate</div></div></div>
        </div>
        <div class="admin-grid-2" style="margin-top:24px">
          <div class="admin-card">
            <div class="card-header"><h3>Booking Status Breakdown</h3></div>
            <canvas id="bookingChart" height="220"></canvas>
          </div>
          <div class="admin-card">
            <div class="card-header"><h3>Room Availability</h3></div>
            <canvas id="roomChart" height="220"></canvas>
          </div>
        </div>
        <div class="admin-card" style="margin-top:24px">
          <div class="card-header"><h3>Most Booked Rooms</h3></div>
          <div class="top-rooms-list">
            ${(r.mostBookedRooms||[]).map((rm, i) => `
              <div class="top-room-row">
                <span class="top-rank">#${i+1}</span>
                <div style="flex:1"><strong>Room ${rm.roomNumber}</strong> — ${rm.type}
                  <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.min(100, rm.bookingCount * 10)}%"></div></div>
                </div>
                <span class="top-count">${rm.bookingCount} bookings</span>
              </div>`).join('') || '<p class="text-muted">No data</p>'}
          </div>
        </div>`;

      // Booking chart
      new Chart(document.getElementById('bookingChart'), {
        type: 'doughnut',
        data: {
          labels: ['Confirmed', 'Pending', 'Cancelled'],
          datasets: [{ data: [r.confirmedBookings, r.pendingBookings, r.cancelledBookings],
            backgroundColor: ['#4ade80','#facc15','#f87171'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
      });

      // Room chart
      new Chart(document.getElementById('roomChart'), {
        type: 'doughnut',
        data: {
          labels: ['Available', 'Occupied', 'Total'],
          datasets: [{ data: [r.availableRooms, r.occupiedRooms, r.totalRooms - r.availableRooms - r.occupiedRooms],
            backgroundColor: ['#60a5fa','#f97316','#e5e7eb'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
      });

    } catch (err) { showToast(err.message, 'error'); }
  }

  loadReports();
  initNavbar();
</script>
</body>
</html>
