version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: hotel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hotel_db}
      POSTGRES_USER: ${DB_USERNAME:-hotel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotel_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hotel_user} -d ${DB_NAME:-hotel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_network

  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hotel_db}
      DB_USERNAME: ${DB_USERNAME:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_password}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      # OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Email
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # PayPal
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      # App
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      OAUTH2_REDIRECT_URIS: ${OAUTH2_REDIRECT_URIS:-http://localhost:8080/oauth2/redirect}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - hotel_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  hotel_network:
    driver: bridge
